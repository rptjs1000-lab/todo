version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_APP_NAME=${VITE_APP_NAME:-뽀짝 투두}
        - VITE_APP_VERSION=${VITE_APP_VERSION:-1.0.0}
    image: ppojjak-todo:latest
    container_name: ppojjak-todo-app

    # 포트 매핑: 로컬 3000 → 컨테이너 80
    ports:
      - "3000:80"

    env_file:
      - .env

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
